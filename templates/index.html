<!DOCTYPE html>
<html>
<head>
    <title>Computer Vision Platform - Object Detection</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="container">
    <a href="/gallery" class="gallery-link">🖼️ Gallery</a>
    <a href="/history" class="history-link">📜 View History</a>
    <h1>YOLO11 Object Detection</h1>
    <div class="upload-area">
        <div class="file-input-wrapper">
            <input type="file" id="fileInput" multiple accept="image/*" required>
        </div>
        <button id="detectBtn">Detect Objects</button>
    </div>

    <div class="params">
        <div class="param-row">
            <label>Confidence threshold:</label>
            <input type="number" id="conf" step="0.05" value="0.3" min="0" max="1">
        </div>
        <div class="param-row">
            <label>NMS threshold:</label>
            <input type="number" id="nms" step="0.05" value="0.45" min="0" max="1">
        </div>
        <div class="param-row">
            <label>Filter classes (names):</label>
            <input type="text" id="filter" placeholder="e.g. person, car, dog (leave empty for all)">
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const detectBtn = document.getElementById('detectBtn');
    detectBtn.onclick = async (e) => {
        e.preventDefault();
        const files = fileInput.files;
        if (!files.length) return;
        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('files', files[i]);
        }
        const conf = document.getElementById('conf').value;
        const nms = document.getElementById('nms').value;
        const filter = document.getElementById('filter').value;
        let url = `/detect?conf_threshold=${conf}&nms_threshold=${nms}`;
        if (filter.trim()) url += `&filter_classes=${filter.trim()}`;
        const response = await fetch(url, { method: 'POST', body: formData });
        const data = await response.json();
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<h2>Results</h2>';
        for (const item of data.results) {
            resultsDiv.innerHTML += `
                <div class="result-item">
                    <h3>${escapeHtml(item.filename)}</h3>
                    <div class="result-row">
                        <div class="image-box">
                            <img src="data:image/jpeg;base64,${item.image}" alt="detected">
                        </div>
                        <div class="detections-box">
                            <h3>Detections</h3>
                            <pre>${JSON.stringify(item.detections, null, 2)}</pre>
                        </div>
                    </div>
                </div>
            `;
        }
    };
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
